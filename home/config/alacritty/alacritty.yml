env:
  TERM: xterm-256color

window:
  padding:
    x: 7
    y: 1

scrolling:
  history: 10000
  auto_scroll: true

font:
  normal:
    family: ProFont
    style: Regular

  bold:
    family: ProFont
    style: Bold

  italic:
    family: ProFont
    style: Italic

    size: 10.0

raw_bold_text_with_bright_colors: true

background_opacity: 1.0

cursor:
  style: Beam

# Live config reload (changes require restart)
live_config_reload: true

shell:
  program: /bin/zsh

mouse:
  double_click: { threshold: 300 }
  hide_when_typing: false
  url:
    launcher:
      program: firefox-bin
      args: []

key_bindings:
    - { key: V,        mods: Control|Shift, action: Paste            }
    - { key: C,        mods: Control|Shift, action: Copy             }
    - { key: Key0,     mods: Control,       action: ResetFontSize    }
    - { key: Equals,   mods: Control,       action: IncreaseFontSize }
    - { key: Add,      mods: Control,       action: IncreaseFontSize }
    - { key: Subtract, mods: Control,       action: DecreaseFontSize }
    - { key: Minus,    mods: Control,       action: DecreaseFontSize }

# weeb-trash colors
colors:
  # Default colors
  primary:
    background: '0x0c0b1b'
    foreground: '0xd1c7d5'

  # Normal colors
  normal:
    black:   '0x0c0b1b'
    red:     '0x524c64'
    green:   '0xc43647'
    yellow:  '0xf55763'
    blue:    '0x36549b'
    magenta: '0xe47986'
    cyan:    '0x5f97cb'
    white:   '0xd1c7d5'

  # Bright colors
  bright:
    black:   '0x928b95'
    red:     '0x524c64'
    green:   '0xc43647'
    yellow:  '0xf55763'
    blue:    '0x36549b'
    magenta: '0xe47986'
    cyan:    '0x5f97cb'
    white:   '0xd1c7d5'
