backend = "xrender";

# Blur
#blur-background = true;
#blur-kern = "3x3box"
#blur-background-fixed = true;

#blur:
#{
#  method = "kernel";
#  size = 15;
#  deviation = 5.0;
#};

# Fading
fading = true;
fade-in-step = 0.3;
fade-out-step = 0.3;

# Opacity
opacity-rule = [ "87:class_g = 'Alacritty'" ];

detect-client-opacity = true;
refresh-rate = 60;
